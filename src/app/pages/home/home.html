<div>
  <div class="container">
    <div class="header">
      <h1>BIENVENIDO</h1>

      <div class="pagination-toggle">
        <label class="toggle-switch">
          <input type="checkbox"
                 [checked]="paginationEnabled"
                 (change)="togglePagination($any($event.target).checked)" />
          <span class="toggle-slider"></span>
        </label>
        <span class="toggle-label">Paginación</span>
      </div>
    </div>

    <div class="views-grid">
      <div class="card-container" *ngFor="let card of visibleCards">
        <div class="card-effect">
          <div class="card-inner">
            <div class="card__liquid"></div>
            <div class="card__shine"></div>
            <div class="card__glow"></div>
            <div class="card__content">
              <div class="card__badge">{{ card.badge }}</div>
              <div class="card__image" [style.background-image]="'url(' + card.image + ')'"></div>
              <div class="card__text">
                <p class="card__title">{{ card.title }}</p>
                <p class="card__description">{{ card.description }}</p>
              </div>
              <div class="card__footer">
                <div class="card__price">{{ card.footer }}</div>
                <div class="card__button" (click)="navigate(card.action)">
                  <svg viewBox="0 0 24 24" width="16" height="16">
                    <path fill="currentColor" d="M5 12H19M12 5V19"
                          stroke="currentColor" stroke-width="2"></path>
                  </svg>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="pagination-controls" *ngIf="paginationEnabled">
      <span class="page-info">
        Página {{ currentPage }} de {{ totalPages }}
      </span>
      <button class="page-btn"
              [disabled]="currentPage === 1"
              (click)="goToPage(currentPage - 1)">
        ‹ Anterior
      </button>
      <button class="page-btn"
              *ngFor="let p of pages"
              [class.active]="p === currentPage"
              (click)="goToPage(p)">
        {{ p }}
      </button>
      <button class="page-btn"
              [disabled]="currentPage === totalPages"
              (click)="goToPage(currentPage + 1)">
        Siguiente ›
      </button>
    </div>

  </div>
</div>
